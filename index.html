<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интернет-магазин PAYKAR Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

 <div id="orderModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 style="color: #27ae60;">Оформление заказа</h2>
        <hr>
        
        <div class="form-group">
            <label>Ваше имя:</label>
            <input type="text" id="userName" placeholder="Например: Ахмед">
        </div>

        <div class="form-group">
            <label>Телефон для связи:</label>
            <input type="text" id="userPhone" placeholder="+992 900 00 0000">
        </div>

        <div class="form-group">
            <label>Способ получения:</label>
            <select id="deliveryType" onchange="toggleAddress()">
                <option value="delivery">Доставка (курьером)</option>
                <option value="pickup">Самовывоз (из магазина)</option>
            </select>
        </div>

        <div id="addressBlock" class="form-group">
            <label>Адрес доставки:</label>
            <input type="text" id="userAddress" placeholder="Район, улица, дом...">
        </div>

        <label>Выберите способ оплаты:</label>
        <div class="payment-grid">
            <label class="pay-card">
                <input type="radio" name="payment" value="Alif Mobi">
                <img src="https://alif.tj/img/alif-logo.png" alt="Alif">
                <span>Alif Mobi</span>
            </label>
            <label class="pay-card">
                <input type="radio" name="payment" value="Dushanbe City">
                <img src="https://dushanbecity.tj/favicon.ico" alt="DC">
                <span>Dushanbe City</span>
            </label>
            <label class="pay-card">
                <input type="radio" name="payment" value="Cash" checked>
                <div class="cash-icon">💵</div>
                <span>Наличными</span>
            </label>
        </div>

        <div class="final-total">Итого к оплате: <span id="modal-total">0</span> смн.</div>
        <button class="confirm-btn" onclick="processOrder()">Оплатить и заказать</button>
    </div>
</div>

    <header>
        <div class="navbar">
            <div class="logo">PAYKAR</div>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Поиск товаров..." onkeyup="searchProduct()">
            </div>
            <div class="cart-info">🛒 Корзина: <span id="cart-count">0</span></div>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <h3>Каталог</h3>
            <ul id="category-list">
                <li onclick="filterProducts('all')">Все товары</li>
                <li onclick="filterProducts('dairy')">Молочные продукты</li>
                <li onclick="filterProducts('bakery')">Выпечка и хлеб</li>
                <li onclick="filterProducts('drinks')">Напитки</li>
            </ul>
        </aside>

        <main class="content">
            <div class="product-grid" id="product-grid">
                </div>
        </main>

        <aside class="cart-panel">
            <h3>Ваша корзина</h3>
            <div id="cart-items" class="cart-items">
                <p class="empty-text">Корзина пуста</p>
            </div>
            <div class="cart-total">
                <strong>Итого:</strong> <span id="total-price">0</span> смн.
            </div>
            <button class="buy-btn">Оформить заказ</button>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
