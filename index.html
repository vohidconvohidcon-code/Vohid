<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ёвар - Мағозаи Онлайн</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo" onclick="openAdmin()">🛒 ЁВАР</div>
        <div class="cart-box" onclick="sendOrder()">
            Сабад: <span id="cart-count">0</span>
        </div>
    </header>

    <nav class="category-nav">
        <button onclick="filterCategory('Ҳама')">Ҳама</button>
        <button onclick="filterCategory('Ширӣ')">Ширӣ</button>
        <button onclick="filterCategory('Нӯшокиҳо')">Нӯшокиҳо</button>
        <button onclick="filterCategory('Хӯрокворӣ')">Хӯрокворӣ</button>
    </nav>

    <main id="main-grid" class="products-grid">
        </main>

    <div id="admin-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeAdmin()">&times;</span>
            <div id="admin-auth">
                <h3>Даромад ба Админ</h3>
                <input type="password" id="admin-pass" placeholder="Рамз (1234)">
                <button onclick="checkAdminPass()">Даромад</button>
            </div>
            <div id="admin-content" style="display:none;">
                <h3>Илова / Ислоҳи Маҳсулот</h3>
                <input type="text" id="p-name" placeholder="Номи маҳсулот">
                <input type="number" id="p-price" placeholder="Нарх">
                <input type="text" id="p-img" placeholder="Ссылкаи расм">
                <select id="p-cat">
                    <option value="Ширӣ">Ширӣ</option>
                    <option value="Нӯшокиҳо">Нӯшокиҳо</option>
                    <option value="Хӯрокворӣ">Хӯрокворӣ</option>
                </select>
                <button id="save-btn" onclick="saveProduct()">Сабт кардан</button>
                <hr>
                <div id="admin-product-list"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
