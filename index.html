<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЁВАР - Мағозаи Онлайн</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="header">
        <div class="header-main container">
            <div class="logo">🛒 ЁВАР</div>
            <div class="cart-btn" onclick="toggleCart()">
                Сабад <span id="cart-badge" class="badge">0</span>
            </div>
        </div>
    </header>

    <main class="container main-content">
        <h2 class="section-title">Маҳсулотҳои мо</h2>
        <div class="product-grid" id="product-grid"></div>
    </main>

    <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
    <aside class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2>Сабади шумо</h2>
            <button class="close-btn" onclick="toggleCart()">&times;</button>
        </div>
        <div class="cart-items" id="cart-items"></div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Ҷамъ:</span>
                <strong id="total-price">0.00 смн</strong>
            </div>
            <button class="checkout-btn" onclick="openCheckout()">Оформить заказ</button>
        </div>
    </aside>

    <div id="checkoutModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeCheckout()">&times;</span>
            <h3>Тасдиқи фармоиш</h3>
            <div class="form-group">
                <input type="text" id="clientName" placeholder="Номи шумо" required>
            </div>
            <div class="form-group">
                <input type="tel" id="clientPhone" placeholder="Телефон: 900112233" required>
            </div>
            <div class="form-group">
                <select id="deliveryType" onchange="toggleAddress()">
                    <option value="Доставка">Доставка (Бурда расонидан)</option>
                    <option value="Самовывоз">Самовывоз (Худам мегирам)</option>
                </select>
            </div>
            <div class="form-group" id="addressBlock">
                <input type="text" id="clientAddress" placeholder="Суроғаи пурра">
            </div>
            
            <div class="receipt-section">
                <label>Бор кардани расид (Чеки пардохт):</label>
                <input type="file" id="receiptFile" accept="image/*">
            </div>

            <button class="submit-btn" id="sendBtn" onclick="sendOrder()">Фиристодани заказ</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
