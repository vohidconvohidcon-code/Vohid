<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ёвар - Интернет Магазин</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="header">
        <div class="header-container">
            <div class="logo">
                <i class="fa-solid fa-basket-shopping"></i> EVAR
            </div>
            <div class="search-box">
                <i class="fa-solid fa-search"></i>
                <input type="text" id="searchInput" placeholder="Поиск товаров..." oninput="searchProducts()">
            </div>
            <div class="mobile-cart-btn" onclick="toggleMobileCart()">
                <i class="fa-solid fa-cart-shopping"></i>
                <span id="mobile-cart-badge" class="badge">0</span>
            </div>
        </div>
    </header>

    <div class="main-layout">
        
        <aside class="sidebar">
            <h3>Каталог</h3>
            <ul class="category-list">
                <li class="active" onclick="filterProducts('all', this)">Все товары</li>
                <li onclick="filterProducts('dairy', this)">Молочные продукты</li>
                <li onclick="filterProducts('bakery', this)">Выпечка и хлеб</li>
                <li onclick="filterProducts('drinks', this)">Напитки</li>
                <li onclick="filterProducts('fruits', this)">Фрукты и овощи</li>
            </ul>
        </aside>

        <main class="products-section">
            <h2 id="category-title">Все товары</h2>
            <div class="product-grid" id="product-grid">
                </div>
        </main>

        <aside class="cart-sidebar" id="cartSidebar">
            <div class="cart-header">
                <h3><i class="fa-solid fa-cart-shopping"></i> Корзина</h3>
                <i class="fa-solid fa-xmark close-cart" onclick="toggleMobileCart()"></i>
            </div>
            <div class="cart-items" id="cart-items">
                <div class="empty-cart">Корзина пуста</div>
            </div>
            <div class="cart-footer">
                <div class="total-row">
                    <span>Итого:</span>
                    <strong id="total-price">0.00 смн</strong>
                </div>
                <button class="checkout-btn" onclick="openCheckout()">Оформить заказ</button>
            </div>
        </aside>
    </div>

    <div id="checkoutModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeCheckout()">&times;</span>
            <h2>Оформление заказа</h2>
            <div class="checkout-form">
                <input type="text" id="clientName" placeholder="Ваше Имя" required>
                <input type="tel" id="clientPhone" placeholder="Ваш Телефон (+992...)" required>
                
                <select id="deliveryType" onchange="toggleAddress()">
                    <option value="delivery">Доставка до двери</option>
                    <option value="pickup">Самовывоз (бесплатно)</option>
                </select>
                
                <input type="text" id="clientAddress" placeholder="Адрес доставки (Улица, Дом)">

                <div class="payment-methods">
                    <label class="pay-method">
                        <input type="radio" name="payment" value="Alif Mobi" checked>
                        <span><i class="fa-solid fa-wallet"></i> Alif Mobi</span>
                    </label>
                    <label class="pay-method">
                        <input type="radio" name="payment" value="Наличные">
                        <span><i class="fa-solid fa-money-bill"></i> Наличными</span>
                    </label>
                </div>

                <button class="pay-btn" onclick="sendOrder()" id="sendBtn">Подтвердить и Заказать</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
