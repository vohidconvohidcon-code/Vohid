<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЁВАР - Мағозаи Онлайн</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="header">
        <div class="header-main container">
            <div class="logo">🛒 ЁВАР</div>
            <nav class="nav-tabs">
                <button class="tab-btn active" onclick="showSection('shop')">Мағоза</button>
                <button class="tab-btn" onclick="showSection('history')">Харидҳои ман</button>
            </nav>
            <div class="cart-btn" onclick="toggleCart()">
                Сабад <span id="cart-badge" class="badge">0</span>
            </div>
        </div>
    </header>

    <main class="container">
        <section id="shop-section" class="active-section">
            <div class="categories">
                <button class="cat-btn active" onclick="filterProduct('all')">Ҳама</button>
                <button class="cat-btn" onclick="filterProduct('milk')">Ширӣ</button>
                <button class="cat-btn" onclick="filterProduct('water')">Нушокиҳо</button>
            </div>
            
            <div class="product-grid">
                <div class="product-card" data-category="milk">
                    <img src="https://vash-vibor.tj/wp-content/uploads/2021/05/moloko-saodat-25.jpg" class="product-img">
                    <h3>Шири Саодат 1л</h3>
                    <p class="price">12.00 смн</p>
                    <button class="add-btn" onclick="addToCart(1, 'Шири Саодат', 12.00)">Илова кардан</button>
                </div>
                <div class="product-card" data-category="water">
                    <img src="https://siyoma.tj/wp-content/uploads/2020/02/1.5.png" class="product-img">
                    <h3>Оби Сиёма 1.5л</h3>
                    <p class="price">5.00 смн</p>
                    <button class="add-btn" onclick="addToCart(2, 'Оби Сиёма', 5.00)">Илова кардан</button>
                </div>
            </div>
        </section>

        <section id="history-section" style="display: none;">
            <h2 class="section-title">Таърихи фармоишҳо</h2>
            <div id="history-list"></div>
        </section>
    </main>

    <div class="overlay" id="overlay" onclick="toggleCart()"></div>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>Сабад</h2>
            <button onclick="toggleCart()">&times;</button>
        </div>
        <div id="cart-items" class="cart-body"></div>
        <div class="sidebar-footer">
            <div class="total">Ҷамъ: <span id="total-price">0.00</span> смн</div>
            <button class="order-btn" onclick="openCheckout()">Давом додан</button>
        </div>
    </aside>

    <div id="checkoutModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeCheckout()">&times;</span>
            <h2>Тасдиқи пардохт</h2>
            <input type="text" id="custName" placeholder="Номи шумо" class="modal-input">
            <input type="tel" id="custPhone" placeholder="Телефон" class="modal-input">
            
            <div class="payment-box">
                <p>Пулро ба ин корт гузаронед:</p>
                <div class="card-num">💳 9988 1122 3344 5566</div>
                <p class="small">Alif Mobi / Humo / DC</p>
            </div>

            <label>Скриншоти чекро бор кунед:</label>
            <input type="file" id="receiptImg" accept="image/*">
            <button class="final-btn" id="sendBtn" onclick="sendOrder()">Фиристодан</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
